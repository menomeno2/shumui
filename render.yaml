services:
  - type: web
    name: methaq-shumul-system
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /
    autoDeployTrigger: commit

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: methaq-shumul-db
          property: connectionString

      - key: SECRET_KEY
        sync: false

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"

databases:
  - name: methaq-shumul-db
    plan: free
    region: frankfurt
    postgresMajorVersion: "18"
    databaseName: performance_db
    user: perf_user
